<svg width="100%" viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Prompt Cache 前缀命中原理</title>
  <desc>对比两次请求中相同前缀（System Prompt + 历史）被缓存复用，与没有缓存时全量重新计算的区别。展示命中缓存后只需计算新增部分的计算量节省。</desc>

  <!-- 标题行 -->
  <text x="30" y="26" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#374151">场景 A — 无 Prompt Cache（每次全量 Prefill）</text>

  <!-- 请求1 -->
  <text x="30" y="52" font-family="Inter,sans-serif" font-size="11" fill="#9CA3AF">第 1 次请求</text>
  <rect x="30"  y="58" width="82"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="71"  y="76" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">SysPrompt</text>
  <rect x="118" y="58" width="66"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="151" y="76" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">历史 1</text>
  <rect x="190" y="58" width="66"  height="28" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="223" y="76" font-family="Inter,sans-serif" font-size="12" fill="#991B1B" text-anchor="middle">问题 A</text>
  <text x="270" y="76" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">→ 全部重新计算 K/V</text>
  <rect x="468" y="62" width="66"  height="20" rx="3" fill="#FCA5A5" opacity="0.8"/>
  <rect x="540" y="62" width="50"  height="20" rx="3" fill="#FCA5A5" opacity="0.7"/>
  <rect x="596" y="62" width="50"  height="20" rx="3" fill="#FCA5A5" opacity="0.5"/>
  <text x="690" y="76" font-family="Inter,sans-serif" font-size="11" fill="#DC2626" text-anchor="middle">全算</text>

  <!-- 请求2 -->
  <text x="30" y="104" font-family="Inter,sans-serif" font-size="11" fill="#9CA3AF">第 2 次请求</text>
  <rect x="30"  y="110" width="82"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="71"  y="128" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">SysPrompt</text>
  <rect x="118" y="110" width="66"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="151" y="128" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">历史 1</text>
  <rect x="190" y="110" width="66"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="223" y="128" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">历史 2</text>
  <rect x="262" y="110" width="66"  height="28" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="295" y="128" font-family="Inter,sans-serif" font-size="12" fill="#991B1B" text-anchor="middle">问题 B</text>
  <text x="342" y="128" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">→ 又全部重新算</text>
  <rect x="468" y="114" width="66"  height="20" rx="3" fill="#FCA5A5" opacity="0.8"/>
  <rect x="540" y="114" width="50"  height="20" rx="3" fill="#FCA5A5" opacity="0.7"/>
  <rect x="596" y="114" width="50"  height="20" rx="3" fill="#FCA5A5" opacity="0.7"/>
  <rect x="652" y="114" width="40"  height="20" rx="3" fill="#FCA5A5" opacity="0.5"/>
  <text x="700" y="128" font-family="Inter,sans-serif" font-size="11" fill="#DC2626" text-anchor="right">全算</text>

  <text x="30" y="158" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">↑ SysPrompt 和历史 1 在两次请求中完全相同，却被重复计算了两遍</text>

  <!-- 分隔线 -->
  <line x1="30" y1="174" x2="690" y2="174" stroke="#D1D5DB" stroke-width="1.2"/>

  <!-- 场景B -->
  <text x="30" y="196" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#374151">场景 B — 有 Prompt Cache（相同前缀直接复用）</text>

  <!-- 第1次请求（建立缓存） -->
  <text x="30" y="220" font-family="Inter,sans-serif" font-size="11" fill="#9CA3AF">第 1 次请求（冷启动，建立缓存）</text>
  <rect x="30"  y="226" width="82"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="71"  y="244" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">SysPrompt</text>
  <rect x="118" y="226" width="66"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="151" y="244" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">历史 1</text>
  <rect x="190" y="226" width="66"  height="28" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="223" y="244" font-family="Inter,sans-serif" font-size="12" fill="#991B1B" text-anchor="middle">问题 A</text>
  <!-- 缓存存储标注 -->
  <rect x="30"  y="260" width="154" height="16" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
  <text x="107" y="271" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle">存入 Prompt Cache（TTL 开始）</text>
  <line x1="71"  y1="254" x2="71"  y2="259" stroke="#D97706" stroke-width="0.8"/>
  <line x1="151" y1="254" x2="151" y2="259" stroke="#D97706" stroke-width="0.8"/>

  <!-- 第2次请求（命中） -->
  <text x="30" y="294" font-family="Inter,sans-serif" font-size="11" fill="#9CA3AF">第 2 次请求（TTL 内，命中缓存）</text>
  <rect x="30"  y="300" width="82"  height="28" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="71"  y="315" font-family="Inter,sans-serif" font-size="11" fill="#78350F" text-anchor="middle">SysPrompt ✓</text>
  <text x="71"  y="326" font-family="Inter,sans-serif" font-size="9"  fill="#92400E" text-anchor="middle">命中，跳过</text>
  <rect x="118" y="300" width="66"  height="28" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="151" y="315" font-family="Inter,sans-serif" font-size="11" fill="#78350F" text-anchor="middle">历史 1 ✓</text>
  <text x="151" y="326" font-family="Inter,sans-serif" font-size="9"  fill="#92400E" text-anchor="middle">命中，跳过</text>
  <rect x="190" y="300" width="66"  height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="223" y="318" font-family="Inter,sans-serif" font-size="12" fill="#5B21B6" text-anchor="middle">历史 2</text>
  <rect x="262" y="300" width="66"  height="28" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="295" y="318" font-family="Inter,sans-serif" font-size="12" fill="#991B1B" text-anchor="middle">问题 B</text>
  <text x="345" y="318" font-family="Inter,sans-serif" font-size="12" fill="#059669">← 只计算这两部分</text>
</svg>
