<svg width="100%" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>注意力计算公式四步拆解</title>
  <desc>将 Attention(Q,K,V)=softmax(QKt/sqrt(d))V 拆解为四个步骤：点积计算相似度、缩放防止溢出、softmax 转为权重、加权读取 V 向量。以「天气」token 为例展示实际权重分布。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 公式 banner -->
  <rect x="30" y="14" width="660" height="36" rx="8"
        fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="360" y="37" font-family="'JetBrains Mono',monospace,sans-serif" font-size="14" font-weight="600"
        fill="#92400E" text-anchor="middle">Attention(Q, K, V)  =  softmax( Q · Kᵀ / √d ) · V</text>

  <!-- Step 1 -->
  <rect x="14" y="68" width="22" height="22" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="25" y="84" font-family="Inter,sans-serif" font-size="12" font-weight="700"
        fill="#DC2626" text-anchor="middle">1</text>
  <text x="44" y="84" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#111827">Q · Kᵀ  ——  计算相似度分数</text>
  <text x="44" y="104" font-family="Inter,sans-serif" font-size="12" fill="#4B5563">Q(天气) 与各历史 token 的 K 做点积，数值越大代表语义越相关：</text>

  <!-- 点积结果条 -->
  <text x="44"  y="128" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">K(请帮)</text>
  <rect x="110" y="116" width="22"  height="14" rx="3" fill="#BFDBFE"/>
  <text x="138" y="128" font-family="'JetBrains Mono',monospace" font-size="12" fill="#374151">0.4</text>

  <text x="44"  y="150" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">K(分析)</text>
  <rect x="110" y="138" width="44"  height="14" rx="3" fill="#93C5FD"/>
  <text x="160" y="150" font-family="'JetBrains Mono',monospace" font-size="12" fill="#374151">0.8</text>

  <text x="44"  y="172" font-family="Inter,sans-serif" font-size="12" fill="#1D4ED8" font-weight="600">K(天气)</text>
  <rect x="110" y="160" width="200" height="14" rx="3" fill="#2563EB"/>
  <text x="316" y="172" font-family="'JetBrains Mono',monospace" font-size="12" fill="#1D4ED8" font-weight="600">9.2  ← 自注意力，最高</text>

  <text x="44"  y="194" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">K(情况)</text>
  <rect x="110" y="182" width="60"  height="14" rx="3" fill="#60A5FA"/>
  <text x="176" y="194" font-family="'JetBrains Mono',monospace" font-size="12" fill="#374151">1.1</text>

  <!-- 分隔 -->
  <line x1="30" y1="210" x2="690" y2="210" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 2 -->
  <rect x="14" y="220" width="22" height="22" rx="5" fill="#FEF9C3" stroke="#D97706" stroke-width="1"/>
  <text x="25" y="236" font-family="Inter,sans-serif" font-size="12" font-weight="700"
        fill="#D97706" text-anchor="middle">2</text>
  <text x="44" y="236" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#111827">÷ √d  ——  缩放，防止数值溢出</text>
  <text x="44" y="256" font-family="Inter,sans-serif" font-size="12" fill="#4B5563">d 为向量维度（通常 64~128）。不缩放则 softmax 退化为 one-hot，只关注极少数位置。</text>
  <text x="44" y="274" font-family="'JetBrains Mono',monospace" font-size="12" fill="#374151">[0.4, 0.8, 9.2, 1.1]  ÷ √64  →  [0.05, 0.10, 1.15, 0.14]</text>

  <!-- 分隔 -->
  <line x1="30" y1="290" x2="690" y2="290" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 3 -->
  <rect x="14" y="300" width="22" height="22" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="25" y="316" font-family="Inter,sans-serif" font-size="12" font-weight="700"
        fill="#059669" text-anchor="middle">3</text>
  <text x="44" y="316" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#111827">softmax  ——  转为注意力权重（和为 1）</text>

  <!-- 权重可视化 -->
  <text x="44"  y="342" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">请帮</text>
  <rect x="80"  y="330" width="7"   height="16" rx="2" fill="#6EE7B7" opacity="0.6"/>
  <text x="92"  y="342" font-family="'JetBrains Mono',monospace" font-size="11" fill="#374151">0.04</text>

  <text x="140" y="342" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">分析</text>
  <rect x="176" y="330" width="9"   height="16" rx="2" fill="#6EE7B7" opacity="0.7"/>
  <text x="190" y="342" font-family="'JetBrains Mono',monospace" font-size="11" fill="#374151">0.05</text>

  <text x="244" y="342" font-family="Inter,sans-serif" font-size="12" fill="#059669" font-weight="600">天气</text>
  <rect x="280" y="328" width="72"  height="18" rx="2" fill="#059669"/>
  <text x="358" y="342" font-family="'JetBrains Mono',monospace" font-size="11" fill="#065F46" font-weight="600">0.83  ← 权重最大</text>

  <text x="480" y="342" font-family="Inter,sans-serif" font-size="12" fill="#6B7280">情况</text>
  <rect x="516" y="330" width="11"  height="16" rx="2" fill="#6EE7B7" opacity="0.7"/>
  <text x="532" y="342" font-family="'JetBrains Mono',monospace" font-size="11" fill="#374151">0.08</text>

  <!-- Step 4 -->
  <rect x="14" y="364" width="22" height="22" rx="5" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="25" y="380" font-family="Inter,sans-serif" font-size="12" font-weight="700"
        fill="#2563EB" text-anchor="middle">4</text>
  <text x="44" y="380" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#111827">· V  ——  加权读取，得到融合上下文的输出向量</text>
  <text x="44" y="396" font-family="Inter,sans-serif" font-size="12" fill="#4B5563">输出 = 0.04·V[请帮] + 0.05·V[分析] + 0.83·V[天气] + 0.08·V[情况]  →  传入下一层</text>
</svg>
